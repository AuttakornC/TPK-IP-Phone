services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wireless_pa}
      POSTGRES_USER: ${POSTGRES_USER:-wireless_pa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wireless_pa}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wireless_pa} -d ${POSTGRES_DB:-wireless_pa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wireless_pa}:${POSTGRES_PASSWORD:-wireless_pa}@db:5432/${POSTGRES_DB:-wireless_pa}?schema=public
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Super Admin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wireless_pa}:${POSTGRES_PASSWORD:-wireless_pa}@db:5432/${POSTGRES_DB:-wireless_pa}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      DEMO_LOGIN_PASSWORD: ${DEMO_LOGIN_PASSWORD:-demo1234}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
