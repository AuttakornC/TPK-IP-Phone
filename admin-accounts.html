<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ผู้ใช้ — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body class="admin">
  <div class="demo-ribbon">DEMO PROTOTYPE</div>
  <div class="admin-shell">
    <aside class="admin-side">
      <div class="flex items-center gap-2 mb-6 px-2">
        <div class="w-8 h-8 rounded-lg bg-blue-700 text-white flex items-center justify-center text-sm font-bold">PA</div>
        <div>
          <div class="font-bold text-white">Admin Console</div>
          <div class="text-xs text-slate-400">Wireless PA · Vendor</div>
        </div>
      </div>
      <nav>
        <a href="admin-dashboard.html" class="admin-nav">📊 Dashboard</a>
        <a href="admin-projects.html"  class="admin-nav">📁 โครงการ</a>
        <a href="admin-speakers.html"  class="admin-nav">🔊 จุดประกาศ</a>
        <a href="admin-accounts.html"  class="admin-nav active">👤 ผู้ใช้</a>
        <a href="status.html"          class="admin-nav">⚙️ สถานะระบบ</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
        <div>
          <h1 class="text-2xl font-bold">ผู้ใช้ทั้งหมด</h1>
          <p class="text-sm text-slate-400 mt-1">จัดการผู้ใช้ทุกโครงการ · กำหนดบทบาทและ assign จุดประกาศ</p>
        </div>
        <button class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">+ เพิ่มผู้ใช้</button>
      </div>

      <div class="admin-card mb-4 flex items-center gap-3 flex-wrap">
        <input id="search" type="text" placeholder="ค้นหา..." class="px-3 py-2 rounded-lg text-sm w-72" />
        <select id="filterProject" class="px-3 py-2 rounded-lg text-sm">
          <option value="">ทุกโครงการ</option>
        </select>
        <select id="filterRole" class="px-3 py-2 rounded-lg text-sm">
          <option value="">ทุก role</option>
          <option value="authority">ผู้บริหาร</option>
          <option value="officer">เจ้าหน้าที่</option>
          <option value="headVillage">ผู้ใหญ่บ้าน</option>
        </select>
      </div>

      <section class="admin-card overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left">
              <th class="px-3 py-2 font-semibold">ผู้ใช้</th>
              <th class="px-3 py-2 font-semibold">บทบาท</th>
              <th class="px-3 py-2 font-semibold">โครงการ</th>
              <th class="px-3 py-2 font-semibold">จุดที่รับผิดชอบ</th>
              <th class="px-3 py-2 font-semibold">เข้าใช้ล่าสุด</th>
              <th class="px-3 py-2 font-semibold">ดำเนินการ</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="assets/mock.js"></script>
  <script src="assets/role.js"></script>
  <script>
    function h(tag, cls, txt) { const el = document.createElement(tag); if (cls) el.className = cls; if (txt != null) el.textContent = txt; return el; }

    const projSel = document.getElementById('filterProject');
    PROJECTS.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; projSel.appendChild(o); });

    const ROLE_BADGE = {
      admin:       'bg-slate-500/15 text-slate-300',
      authority:   'bg-red-500/15 text-red-400',
      officer:     'bg-blue-500/15 text-blue-400',
      headVillage: 'bg-green-500/15 text-green-400',
    };

    function render() {
      const q  = document.getElementById('search').value.trim().toLowerCase();
      const fp = document.getElementById('filterProject').value;
      const fr = document.getElementById('filterRole').value;

      const rows = document.getElementById('rows');
      rows.replaceChildren();

      const list = USERS.filter(u => u.role !== 'admin')
        .filter(u => {
          if (fp && u.projectId !== fp) return false;
          if (fr && u.role !== fr) return false;
          if (q && !(u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))) return false;
          return true;
        });

      if (list.length === 0) {
        const tr = h('tr', '');
        const td = h('td', 'px-3 py-6 text-center text-slate-400', 'ไม่พบผู้ใช้');
        td.colSpan = 6;
        tr.appendChild(td);
        rows.appendChild(tr);
        return;
      }

      list.forEach(u => {
        const proj = PROJECTS.find(p => p.id === u.projectId);
        const tr = h('tr', 'border-t border-white/5 hover:bg-white/5');

        // user
        const userTd = h('td', 'px-3 py-3');
        const wrap = h('div', 'flex items-center gap-3');
        const av = h('div', 'w-9 h-9 rounded-full bg-slate-700 text-slate-200 flex items-center justify-center font-bold text-xs flex-shrink-0', u.name.split(' ').map(p => p[0]).slice(0, 2).join(''));
        wrap.append(av);
        const info = h('div', 'min-w-0');
        info.append(h('div', 'font-medium text-white truncate', u.name));
        info.append(h('div', 'text-xs text-slate-500 truncate', u.email));
        wrap.append(info);
        userTd.append(wrap);
        tr.append(userTd);

        tr.append(h('td', 'px-3 py-3', null));
        tr.lastChild.appendChild(h('span', `inline-flex px-2 py-0.5 text-xs rounded-full font-medium ${ROLE_BADGE[u.role]}`, ROLE_LABEL[u.role].name));

        const projTd = h('td', 'px-3 py-3 text-xs');
        if (proj) {
          const link = h('a', 'text-blue-400 hover:underline', proj.name);
          link.href = `admin-project-detail.html?id=${proj.id}`;
          projTd.append(link);
        } else {
          projTd.append(h('span', 'text-slate-500', '— vendor —'));
        }
        tr.append(projTd);

        const sp = (u.assignedSpeakers || []).length;
        const spTd = h('td', 'px-3 py-3 font-mono text-slate-300', sp > 0 ? `${sp} จุด` : '—');
        tr.append(spTd);

        tr.append(h('td', 'px-3 py-3 font-mono text-xs text-slate-400', u.last));

        const actsTd = h('td', 'px-3 py-3');
        const acts = h('div', 'flex gap-1');
        acts.append(h('button', 'p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded', '✎'));
        acts.append(h('button', 'p-1.5 text-slate-400 hover:text-amber-400 hover:bg-amber-500/10 rounded', '🔑'));
        acts.append(h('button', 'p-1.5 text-slate-400 hover:text-red-400 hover:bg-red-500/10 rounded', '🗑'));
        actsTd.append(acts);
        tr.append(actsTd);

        rows.append(tr);
      });
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filterProject').addEventListener('change', render);
    document.getElementById('filterRole').addEventListener('change', render);
    render();
  </script>
</body>
</html>
