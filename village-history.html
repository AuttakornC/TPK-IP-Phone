<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5"/>
<title>ประวัติการประกาศ — ผู้ใหญ่บ้าน</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body class="elder">
  <div class="demo-ribbon">DEMO PROTOTYPE</div>

  <div class="elder-screen">
    <h1 class="mb-2">ประวัติการประกาศของฉัน</h1>
    <p class="text-base text-slate-500 mb-5">รายการที่คุณประกาศย้อนหลัง 30 วัน</p>

    <div id="historyList" class="space-y-3"></div>

    <div id="empty" class="hidden bg-white border-2 border-slate-200 rounded-3xl p-8 text-center mt-4">
      <div class="text-5xl mb-3">📭</div>
      <p>ยังไม่มีประวัติการประกาศ</p>
    </div>
  </div>

  <nav class="elder-bottombar">
    <a href="village.html"><span class="ic">🏠</span><span>หน้าหลัก</span></a>
    <a href="village-history.html" class="active"><span class="ic">📜</span><span>ประวัติ</span></a>
    <a href="index.html"><span class="ic">🚪</span><span>ออก</span></a>
  </nav>

  <script src="assets/mock.js"></script>
  <script src="assets/role.js"></script>
  <script>
    const user = getCurrentUser() || USERS.find(u => u.username === DEMO_USER_BY_ROLE.headVillage);
    const myEntries = LOG_ENTRIES.filter(e => user && e.userId === user.username);

    const list = document.getElementById('historyList');
    if (myEntries.length === 0) {
      document.getElementById('empty').classList.remove('hidden');
    } else {
      myEntries.forEach(e => {
        const card = document.createElement('div');
        card.className = 'bg-white border-2 border-slate-200 rounded-3xl p-5';

        const head = document.createElement('div');
        head.className = 'flex items-start gap-4';

        const ico = document.createElement('div');
        ico.className = 'flex-shrink-0';
        ico.style.fontSize = '40px';
        const TYPE_ICON = { emergency: '🚨', group: '📢', single: '🔊', mp3: '🎵', scheduled: '⏰' };
        ico.textContent = TYPE_ICON[e.type] || '📢';
        head.appendChild(ico);

        const info = document.createElement('div');
        info.className = 'flex-1 min-w-0';

        const target = document.createElement('div');
        target.style.fontSize = '20px';
        target.style.fontWeight = '700';
        target.style.color = '#0f172a';
        target.textContent = e.target;
        info.appendChild(target);

        const meta = document.createElement('div');
        meta.style.fontSize = '17px';
        meta.style.color = '#64748b';
        meta.style.marginTop = '4px';
        meta.textContent = `${e.time} · เป็นเวลา ${e.duration} นาที`;
        info.appendChild(meta);

        head.appendChild(info);
        card.appendChild(head);

        if (e.recording) {
          const playBtn = document.createElement('button');
          playBtn.className = 'mt-4 w-full bg-blue-100 text-blue-700 font-bold rounded-2xl flex items-center justify-center gap-2';
          playBtn.style.minHeight = '60px';
          playBtn.style.fontSize = '19px';
          const icSpan = document.createElement('span');
          icSpan.style.fontSize = '24px';
          icSpan.textContent = '▶';
          playBtn.appendChild(icSpan);
          playBtn.append(' ฟังเสียงที่บันทึกไว้');
          card.appendChild(playBtn);
        }

        list.appendChild(card);
      });
    }
  </script>
</body>
</html>
